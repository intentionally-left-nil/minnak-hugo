baseURL  = "http://localhost:1313/"
title    = "terminal.space"
language = "en"

# Paginate: 15 posts per page (matches Ghost theme default)
paginate = 15

# Taxonomies
# We use singular keys on both sides: front-matter is `category: [...]` /
# `tag: [...]`, and the rendered URLs are /category/<slug>/ and
# /tag/<slug>/. The theme assumes this convention (no fallbacks).
[taxonomies]
  category = "category"
  tag      = "tag"

# Output formats: generate RSS only for the home page, not tags/categories
[outputs]
  home     = ['html', 'rss']
  section  = ['html']
  taxonomy = ['html']
  term     = ['html']

# Rename the RSS feed file from index.xml to rss.xml
[outputFormats]
  [outputFormats.RSS]
    baseName = "rss"

# Theme module — local replace directive in go.mod points to ../
[module]
  [[module.imports]]
    path = "github.com/intentionally-left-nil/minnak-hugo"

# Site params
[params]
  description = "A minimal dark blog styled after terminal.space"
  search      = true

# Main navigation menu — drives the Categories tab in the sidebar
[menu]
  [[menu.main]]
    name   = "Technology"
    url    = "/category/technology/"
    weight = 1
  [[menu.main]]
    name   = "AI"
    url    = "/category/ai/"
    weight = 2
  [[menu.main]]
    name   = "Cantonese"
    url    = "/category/cantonese/"
    weight = 3
  [[menu.main]]
    name   = "Photography"
    url    = "/category/photography/"
    weight = 4
  [[menu.main]]
    name   = "PNW"
    url    = "/category/pnw/"
    weight = 5
