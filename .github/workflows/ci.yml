name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Hugo .GitInfo and module resolution need full history

      # ── Hugo ──────────────────────────────────────────────────────────────
      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      # ── Go (for markup tests) ─────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tests/go.mod
          cache-dependency-path: tests/go.sum

      # ── Node (for Playwright) ─────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: npm ci
        working-directory: tests/e2e

      # Cache Playwright browsers keyed on the Playwright version in package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        working-directory: tests/e2e

      # ── Cache Hugo module downloads ────────────────────────────────────────
      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/hugo_cache
          key: hugo-modules-${{ hashFiles('exampleSite/go.sum') }}
          restore-keys: hugo-modules-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build example site
        run: hugo --source exampleSite --minify --logLevel warn

      # Build Pagefind search index against the built site
      - name: Build Pagefind index
        run: npx --yes pagefind@latest --site exampleSite/public

      # Lint: fail on path warnings
      - name: Hugo lint (path warnings)
        run: hugo --source exampleSite --renderToMemory --printPathWarnings --logLevel warn

      # ── Markup tests (Go + goquery) ────────────────────────────────────────
      - name: Run Go markup tests
        run: go test ./... -count=1 -v
        working-directory: tests
        env:
          MINNAK_SKIP_BUILD: "1"   # reuse the public/ built above

      # ── E2E tests (Playwright + Pagefind search) ───────────────────────────
      # MINNAK_RUN_PAGEFIND=1 switches the webServer to Python's http.server
      # serving the pre-built public/ dir (which includes the pagefind index),
      # enabling the search.spec.ts tests to run.
      - name: Run Playwright E2E tests (including search)
        run: npx playwright test --reporter=github
        working-directory: tests/e2e
        env:
          MINNAK_RUN_PAGEFIND: "1"

      # ── Upload artifacts on failure ────────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload built site (for inspection)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-site
          path: exampleSite/public/
          retention-days: 3
